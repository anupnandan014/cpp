{% extends 'inventory/base.html' %}
{% block content %}
<a href="{% url 'site_detail' material.site.id %}" class="text-decoration-none small mb-2 d-inline-block">
    <i class="bi bi-arrow-left"></i> Back to {{ material.site.name }}
</a>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card overflow-hidden">
            <div class="p-4" style="background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); color:#fff;">
                <div class="d-flex align-items-center gap-3">
                    <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:48px; height:48px; background-color: rgba(240,99,29,0.25);">
                        <i class="bi bi-dash-circle" style="font-size:1.4rem; color: var(--orange);"></i>
                    </div>
                    <div>
                        <p class="section-label mb-0">Log usage</p>
                        <h4 class="mb-0">{{ material.name }}</h4>
                    </div>
                </div>
            </div>
            <div class="p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Quantity used ({{ material.unit }})</label>
                        <input type="number" name="quantity" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">
                        <i class="bi bi-check-circle"></i> Log usage
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
