{% extends 'inventory/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <a href="{% url 'site_detail' material.site.id %}" class="text-decoration-none small mb-2 d-inline-block">&larr; Back to {{ material.site.name }}</a>
            <h4 class="mb-3">Log usage — {{ material.name }}</h4>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Quantity used ({{ material.unit }})</label>
                    <input type="number" name="quantity" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-secondary w-100">Log usage</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
