{% extends 'inventory/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card p-5 text-center">
            <div class="mx-auto mb-3 rounded-circle d-flex align-items-center justify-content-center" style="width:64px; height:64px; background-color: rgba(240,99,29,0.12);">
                <i class="bi bi-check-lg" style="font-size:1.8rem; color: var(--orange);"></i>
            </div>
            <p class="text-muted mb-1">{{ quantity }} {{ material.unit }} of <strong>{{ material.name }}</strong> used</p>
            <h2 class="fw-bold mb-3">{{ current_stock }} <span class="fs-6 text-muted fw-normal">{{ material.unit }} remaining</span></h2>
            {% if below_threshold %}
                <div class="alert alert-danger d-flex align-items-center gap-2 justify-content-center">
                    <i class="bi bi-exclamation-triangle-fill"></i> Low stock! Reorder needed. An alert has been sent.
                </div>
            {% endif %}
            <a href="{% url 'site_detail' material.site.id %}" class="btn btn-outline-primary mt-2">
                <i class="bi bi-arrow-left"></i> Back to site
            </a>
        </div>
    </div>
</div>
{% endblock %}
