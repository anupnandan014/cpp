{% extends 'inventory/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Construction sites</h2>
    <a href="{% url 'add_site' %}" class="btn btn-primary">+ Add new site</a>
</div>

<div class="row g-3">
{% for site in sites %}
    <div class="col-md-6 col-lg-4">
        <div class="card p-3 h-100">
            <h5 class="mb-1"><a href="{% url 'site_detail' site.id %}" class="text-decoration-none">{{ site.name }}</a></h5>
            <p class="text-muted mb-0">{{ site.location|default:"No location set" }}</p>
        </div>
    </div>
{% empty %}
    <div class="col-12">
        <div class="card p-4 text-center text-muted">
            No sites yet. Click "Add new site" to get started.
        </div>
    </div>
{% endfor %}
</div>
{% endblock %}
